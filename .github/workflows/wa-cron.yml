name: WA Broadcast Cron
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  poke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Poke endpoint (it guards on time + idempotency)
        run: |
          # ה-endpoint עצמו בודק status ו-now>=ask_at/send_at, ומעדכן state ל-sent.
          # אין sleep ארוך (חוק ברזל: runner מוגבל ל-6 שעות). cron כל 5 דק' = מספיק הזדמנויות.
          for i in 1 2 3; do
            echo "poke #$i:"
            curl -s "https://mafte4.vercel.app/api/wa-cron" && echo ""
            sleep 5
          done
          echo "done"
