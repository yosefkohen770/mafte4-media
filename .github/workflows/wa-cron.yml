name: WA Broadcast Cron
on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'   # גיבוי בלבד (לא אמין לזמן מדויק) — מפעיל מחדש את השרשרת אם נפלה

concurrency:
  group: wa-chain
  cancel-in-progress: true   # תמיד ריצה אחת פעילה — מונע ריבוי שרשראות

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 320
    steps:
      - name: Poll loop until target time (reliable — dispatch-triggered, no schedule delay)
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          SVC="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZsdHdub3h0eHd2ZHl0eG94dndtIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NzI4Njg0NiwiZXhwIjoyMDkyODYyODQ2fQ.TbuYZ5kjz1JRa_c3NFhI5qLV9ooEKnKQV5nC_ycq3pw"
          BASE="https://fltwnoxtxwvdytxoxvwm.supabase.co/storage/v1/object/wa-state"
          st() { curl -s -H "apikey: $SVC" -H "Authorization: Bearer $SVC" "$BASE/$1" | python3 -c "import sys,json;print(json.load(sys.stdin).get('status',''))" 2>/dev/null; }
          END=$(( $(date +%s) + 300*60 ))   # חלון לולאה 300 דקות
          while [ $(date +%s) -lt $END ]; do
            curl -s "https://mafte4.vercel.app/api/wa-cron" >/dev/null
            curl -s "https://mafte4.vercel.app/api/wa-test" >/dev/null
            PS=$(st broadcast.json); TS=$(st test.json)
            echo "$(date -u +%H:%M) prod=$PS test=$TS"
            if [ "$PS" != "pending_ask" ] && [ "$PS" != "pending_send" ] && [ "$TS" != "pending" ]; then
              echo "nothing pending — done."; exit 0
            fi
            sleep 60
          done
          # החלון נגמר ועדיין יש ממתין -> מוסר את הלפיד לריצה הבאה (לזמנים רחוקים מ-5 שעות)
          echo "window elapsed; handing off to successor"
          curl -s -X POST -H "Authorization: Bearer $DISPATCH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/yosefkohen770/mafte4-media/actions/workflows/wa-cron.yml/dispatches" -d '{"ref":"master"}'
